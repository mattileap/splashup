org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# RIMOSSO android.enableJetifier: deprecato e non piu' necessario (tutte le
# dipendenze sono gia' AndroidX).
# RIMOSSO android.builtInKotlin=false (aggiunto dal migrator di Flutter):
# con AGP 9 il Built-in Kotlin e' il default e questo progetto e' stato
# migrato (niente piu' plugin kotlin-android).
# newDsl=false resta: mantiene i tipi DSL legacy usati dal Flutter Gradle
# Plugin; verra' rimosso quando Flutter completera' la transizione.
android.newDsl=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
